name: Apply Supabase schema

# Applies db/schema.sql to the Supabase Postgres database using GitHub's runner
# (reliable) instead of the flaky MCP. Runs on manual trigger, or automatically
# whenever db/schema.sql changes on main. Idempotent — the schema uses
# CREATE TABLE IF NOT EXISTS / CREATE OR REPLACE VIEW, so re-runs are safe.
#
# ONE-TIME SETUP: add a repo secret named SUPABASE_DB_URL =
#   the Supabase "session pooler" connection string (Connect -> port 5432),
#   with [YOUR-PASSWORD] replaced by the real database password.
# Repo -> Settings -> Secrets and variables -> Actions -> New repository secret.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['db/schema.sql']

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Apply schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::notice::SUPABASE_DB_URL secret is not set — skipping schema apply. \
To activate: Settings → Secrets and variables → Actions → New repository secret → SUPABASE_DB_URL \
(use the Supabase session-pooler connection string from Dashboard → Connect → port 5432)."
            exit 0
          fi
          echo "Applying db/schema.sql to Supabase..."
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
          echo "✅ Schema applied. Tables + views are live."

      - name: Verify tables exist
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then exit 0; fi
          psql "$SUPABASE_DB_URL" -c "\dt public.*"
