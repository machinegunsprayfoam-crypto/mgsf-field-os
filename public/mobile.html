// public/mobile.html
// Lightweight field tech mobile app — PWA for Klyfton AI

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Gun Field Ops</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #000; color: #fff; }
    .container { max-width: 100%; padding: 1rem; }
    .header { background: linear-gradient(135deg, #ff6b00, #ff8c00); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .job-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .job-card h2 { color: #ff8c00; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 0.3rem; }
    .field input, .field textarea { width: 100%; padding: 0.75rem; background: #222; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 1rem; }
    .field textarea { resize: vertical; min-height: 80px; }
    .btn { background: #ff6b00; color: #fff; padding: 1rem; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 0.5rem; }
    .btn:active { opacity: 0.8; }
    .photo-preview { max-width: 100%; margin-top: 0.5rem; border-radius: 4px; }
    .status { padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
    .status.success { background: #1a3a1a; color: #4caf50; }
    .status.error { background: #3a1a1a; color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Field Ops</h1>
      <p id="sync-status">Online</p>
    </div>

    <div id="status-message"></div>

    <div class="job-card">
      <h2>Current Job</h2>
      <div class="field">
        <label>Job ID</label>
        <input type="text" id="jobId" placeholder="e.g., JOB-405" readonly>
      </div>
      <div class="field">
        <label>Area Completed (sq ft)</label>
        <input type="number" id="areaCompleted" placeholder="2800" min="0">
      </div>
      <div class="field">
        <label>Materials Used</label>
        <textarea id="materialsUsed" placeholder="e.g., 60 gallons spray foam, 2 loads concrete"></textarea>
      </div>
      <div class="field">
        <label>Crew Sign-Off</label>
        <input type="text" id="crewSignoff" placeholder="John Doe">
      </div>
      <div class="field">
        <label>Time On-Site (hours)</label>
        <input type="number" id="hoursOnSite" placeholder="8" step="0.5" min="0">
      </div>
      <div class="field">
        <label>Photo</label>
        <input type="file" id="photoCapture" accept="image/*" capture="environment">
        <img id="photoPreview" class="photo-preview" style="display:none;">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="notes" placeholder="Weather delays, equipment issues, next steps..."></textarea>
      </div>
      <button class="btn" onclick="submitJobUpdate()">Submit Job Update</button>
      <button class="btn" style="background: #666;" onclick="closeJob()">Close Job</button>
    </div>
  </div>

  <script>
    // Service Worker registration for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Load current job from sessionStorage
    function loadCurrentJob() {
      const job = sessionStorage.getItem('currentJob');
      if (job) {
        const jobData = JSON.parse(job);
        document.getElementById('jobId').value = jobData.id || 'JOB-???';
      }
    }

    // Photo preview
    document.getElementById('photoCapture').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const preview = document.getElementById('photoPreview');
          preview.src = evt.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    // Submit job update to Supabase
    async function submitJobUpdate() {
      const data = {
        jobId: document.getElementById('jobId').value,
        areaCompleted: parseInt(document.getElementById('areaCompleted').value) || 0,
        materialsUsed: document.getElementById('materialsUsed').value,
        crewSignoff: document.getElementById('crewSignoff').value,
        hoursOnSite: parseFloat(document.getElementById('hoursOnSite').value) || 0,
        notes: document.getElementById('notes').value,
        timestamp: new Date().toISOString(),
      };

      try {
        // Try online sync first
        const response = await fetch('/api/jobs-sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (response.ok) {
          showStatus('✓ Update synced', 'success');
          setTimeout(() => { window.location.reload(); }, 1000);
        } else {
          throw new Error('Sync failed');
        }
      } catch (e) {
        // Offline fallback
        const pending = JSON.parse(localStorage.getItem('pendingUpdates') || '[]');
        pending.push(data);
        localStorage.setItem('pendingUpdates', JSON.stringify(pending));
        showStatus('✓ Saved offline — will sync when online', 'success');
      }
    }

    // Close job and trigger invoice
    async function closeJob() {
      if (confirm('Close this job? Invoice will auto-generate.')) {
        const jobId = document.getElementById('jobId').value;
        try {
          await fetch('/api/jobs-sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              jobId: jobId,
              action: 'close',
              timestamp: new Date().toISOString(),
            }),
          });
          showStatus('✓ Job closed — invoice triggered', 'success');
          setTimeout(() => { window.location.href = '/'; }, 2000);
        } catch (e) {
          showStatus('✗ Error closing job', 'error');
        }
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status-message');
      el.textContent = msg;
      el.className = status ;
      setTimeout(() => { el.textContent = ''; }, 4000);
    }

    // Check online status
    window.addEventListener('online', () => {
      document.getElementById('sync-status').textContent = 'Online';
      // Sync any pending offline updates
      const pending = JSON.parse(localStorage.getItem('pendingUpdates') || '[]');
      if (pending.length > 0) {
        pending.forEach(async (update) => {
          await fetch('/api/jobs-sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(update),
          });
        });
        localStorage.setItem('pendingUpdates', '[]');
      }
    });

    window.addEventListener('offline', () => {
      document.getElementById('sync-status').textContent = 'Offline (cached)';
    });

    loadCurrentJob();
  </script>
</body>
</html>
